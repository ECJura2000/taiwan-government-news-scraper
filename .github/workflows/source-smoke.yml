name: Source smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "23 20 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python scripts/smoke_sources.py
