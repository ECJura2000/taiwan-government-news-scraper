name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --require-hashes -r requirements-dev.lock.txt
          python -m pip install --no-deps -e .
      - run: python -m compileall -q news_scraper
      - run: python -m pytest -q --cov=news_scraper.quality --cov=news_scraper.utils.text --cov-fail-under=80

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --require-hashes -r requirements-dev.lock.txt
          python -m pip install --no-deps -e .
      - run: python -m ruff check .
      - run: python -m mypy

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --no-deps -e .
      - run: python scripts/benchmark_capacity.py --sizes 1000 10000 --workers 1 4 16 > benchmark-results.json
      - run: python scripts/check_benchmark_budget.py benchmark-results.json benchmarks/baseline.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: taiwan-news-benchmark-results
          path: benchmark-results.json
          retention-days: 1

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --require-hashes -r requirements-security.lock.txt
          python -m pip install --no-deps -e .
      - run: python -m pip_audit -r requirements.lock.txt --require-hashes
      - run: python -m bandit -q -ll -r news_scraper scripts -x tests
      - run: python scripts/check_workflows.py
