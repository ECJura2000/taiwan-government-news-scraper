name: Build and release portable apps

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-release.yml"
      - "build_entry.py"
      - "news-scraper.spec"
      - "news_scraper/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - "scripts/package_release.py"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: portable-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  validate:
    name: Validate source and release intent
    runs-on: ubuntu-latest
    steps:
      - name: Require manual releases to run from main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual releases must run from main, not $GITHUB_REF" >&2
          exit 1

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.lock.txt
            requirements-security.lock.txt

      - name: Install locked validation dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --require-hashes -r requirements-dev.lock.txt
          python -m pip install --require-hashes -r requirements-security.lock.txt
          python -m pip install --no-deps -e .

      - name: Run quality, security and workflow checks
        run: |
          python -m ruff check .
          python -m mypy
          python -m compileall -q news_scraper build_entry.py scripts
          python -m pytest -q --cov=news_scraper --cov-report=term --cov-report=json:coverage-package.json
          python scripts/check_coverage.py coverage-package.json
          python -m bandit -q -ll -r news_scraper scripts -x tests
          python -m pip_audit -r requirements.lock.txt --require-hashes
          python scripts/check_workflows.py

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux
            executable: 各機關新聞整理
          - os: windows-latest
            label: Windows
            platform: windows
            executable: 各機關新聞整理.exe
          - os: macos-latest
            label: macOS
            platform: macos
            executable: 各機關新聞整理
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-build.lock.txt

      - name: Install locked runtime and build dependencies
        shell: bash
        run: |
          python -m pip install --require-hashes -r requirements.lock.txt
          python -m pip install --require-hashes -r requirements-build.lock.txt

      - name: Build single-file GUI and headless executable
        run: pyinstaller --clean --noconfirm news-scraper.spec

      - name: Verify packaged runtime and headless entry point
        shell: bash
        run: |
          "dist/${{ matrix.executable }}" --check-runtime
          "dist/${{ matrix.executable }}" --headless --list-sources > packaged-sources.txt
          grep -q "行政院" packaged-sources.txt

      - name: Smoke-test packaged GUI on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a "dist/${{ matrix.executable }}" --gui-smoke-test

      - name: Smoke-test packaged GUI on Windows or macOS
        if: runner.os != 'Linux'
        shell: bash
        run: |
          "dist/${{ matrix.executable }}" --gui-smoke-test

      - name: Build portable ZIP
        run: >-
          python -m scripts.package_release
          --platform "${{ matrix.platform }}"
          --dist-dir dist
          --output-dir release-assets
          --max-executable-mib 90

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-diagnostics-${{ matrix.platform }}
          path: |
            packaged-sources.txt
            build/各機關新聞整理/warn-各機關新聞整理.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Upload portable archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: portable-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release:
    name: Publish immutable release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Resolve and validate version
        id: release
        shell: bash
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag="v${version}"
          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "$tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Refuse to overwrite an existing release or manual tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite it." >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" != refs/tags/* ]] && git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists; refusing to reuse it." >&2
            exit 1
          fi

      - name: Download portable archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: portable-*
          path: release-assets
          merge-multiple: true

      - name: Verify release set, checksums and total size
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          test -f "release-assets/taiwan-government-news-v${version}-linux.zip"
          test -f "release-assets/taiwan-government-news-v${version}-windows.zip"
          test -f "release-assets/taiwan-government-news-v${version}-macos.zip"
          cd release-assets
          sha256sum *.zip > "taiwan-government-news-v${version}-SHA256SUMS.txt"
          cd ..
          python scripts/check_release_size.py release-assets \
            --max-file-mib 90 \
            --max-total-mib 220 \
            --manifest "release-assets/taiwan-government-news-v${version}-SIZE-MANIFEST.txt" \
            --pattern 'taiwan-government-news-*'

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_args=(--verify-tag)
          else
            tag_args=(--target "$GITHUB_SHA")
          fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            "${tag_args[@]}" \
            --generate-notes \
            --title "各機關新聞整理 $RELEASE_TAG" \
            --notes "三平台 ZIP 內均包含 GUI 與 headless 共用的單檔執行檔。執行檔未簽章；國土管理署來源需要 Chrome 或 Chromium。"
