name: Build and release executables

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYINSTALLER_VERSION: "6.21.0"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: executable-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run static and unit checks
        run: |
          python -m ruff check .
          python -m mypy
          python -m compileall -q news_scraper build_entry.py
          python -m pytest -q --cov=news_scraper.quality --cov=news_scraper.utils.text --cov-fail-under=80

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            asset: news-scraper-linux
          - os: windows-latest
            platform: Windows
            asset: news-scraper-windows.exe
          - os: macos-latest
            platform: macOS
            asset: news-scraper-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install locked runtime and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
          python -m pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"

      - name: Verify package entry point
        run: python -m news_scraper --list-sources

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name news-scraper \
            --add-data "news_scraper/policy.toml:news_scraper" \
            build_entry.py

      - name: Normalize asset name
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/news-scraper.exe "dist/${{ matrix.asset }}"
          else
            mv dist/news-scraper "dist/${{ matrix.asset }}"
            chmod +x "dist/${{ matrix.asset }}"
          fi

      - name: Smoke-test packaged executable
        shell: bash
        run: |
          "dist/${{ matrix.asset }}" --list-sources > dist/smoke-test.txt
          grep -q "行政院" dist/smoke-test.txt

      - name: Generate SHA-256 checksum
        env:
          ASSET_PATH: dist/${{ matrix.asset }}
        run: >-
          python -c "import hashlib, os; from pathlib import Path; p=Path(os.environ['ASSET_PATH']);
          Path(str(p)+'.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n', encoding='utf-8')"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: news-scraper-*
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        run: |
          find release-assets -maxdepth 1 -type f -print
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 6

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          --title "News Scraper $GITHUB_REF_NAME"
