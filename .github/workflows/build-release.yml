name: Build and release executables

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYINSTALLER_VERSION: "6.21.0"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: executable-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  validate:
    name: Validate source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            pyproject.toml

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run static and unit checks
        run: |
          python -m ruff check .
          python -m mypy
          python -m compileall -q news_scraper build_entry.py
          python -m pytest -q --cov=news_scraper.quality --cov=news_scraper.utils.text --cov-fail-under=80

  build:
    name: Build ${{ matrix.platform }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            asset: news-scraper-linux
          - os: windows-latest
            platform: Windows
            asset: news-scraper-windows.exe
          - os: macos-latest
            platform: macOS
            asset: news-scraper-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install locked runtime and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
          python -m pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"

      - name: Verify package entry point
        run: python -m news_scraper --list-sources

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name news-scraper \
            --add-data "news_scraper/policy.toml:news_scraper" \
            build_entry.py

      - name: Normalize asset name
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/news-scraper.exe "dist/${{ matrix.asset }}"
          else
            mv dist/news-scraper "dist/${{ matrix.asset }}"
            chmod +x "dist/${{ matrix.asset }}"
          fi

      - name: Smoke-test packaged executable on Linux or macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          "dist/${{ matrix.asset }}" --list-sources > dist/smoke-stdout.txt 2> dist/smoke-stderr.txt
          test -s dist/smoke-stdout.txt

      - name: Smoke-test packaged executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $executable = (Resolve-Path ".\dist\${{ matrix.asset }}").Path
          $stdoutPath = Join-Path $PWD "dist\smoke-stdout.txt"
          $stderrPath = Join-Path $PWD "dist\smoke-stderr.txt"
          $process = Start-Process `
            -FilePath $executable `
            -ArgumentList "--list-sources" `
            -Wait `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath
          Write-Host "Packaged executable exit code: $($process.ExitCode)"
          if (Test-Path $stdoutPath) {
            Get-Content $stdoutPath
          }
          if (Test-Path $stderrPath) {
            Get-Content $stderrPath
          }
          if ($process.ExitCode -ne 0) {
            throw "Packaged executable exited with code $($process.ExitCode)"
          }
          if (-not (Test-Path $stdoutPath) -or (Get-Item $stdoutPath).Length -eq 0) {
            throw "Packaged executable produced no output"
          }

      - name: Upload smoke-test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diagnostics-${{ matrix.platform }}
          path: |
            dist/smoke-stdout.txt
            dist/smoke-stderr.txt
            build/news-scraper/warn-news-scraper.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Generate SHA-256 checksum
        env:
          ASSET_PATH: dist/${{ matrix.asset }}
        run: >-
          python -c "import hashlib, os; from pathlib import Path; p=Path(os.environ['ASSET_PATH']);
          Path(str(p)+'.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n', encoding='utf-8')"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            verify_tag="true"
          else
            version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path('pyproject.toml').open('rb') as project_file:
              print(tomllib.load(project_file)['project']['version'])
          PY
          )"
            tag="v${version}"
            verify_tag="false"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "verify_tag=$verify_tag" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: news-scraper-*
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        run: |
          find release-assets -maxdepth 1 -type f -print
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 6

      - name: Check whether release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERIFY_TAG: ${{ steps.release.outputs.verify_tag }}
        shell: bash
        run: |
          if [[ "$VERIFY_TAG" == "true" ]]; then
            tag_args=(--verify-tag)
          else
            tag_args=(--target "$GITHUB_SHA")
          fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            "${tag_args[@]}" \
            --generate-notes \
            --title "News Scraper $RELEASE_TAG"

      - name: Confirm existing release
        if: steps.existing.outputs.exists == 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: echo "Release $RELEASE_TAG already exists; publication skipped."
